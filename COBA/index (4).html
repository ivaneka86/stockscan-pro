<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>StockScan Pro - AMandaMart</title>
<style>
:root {
  --brand:#1a73e8; --brand2:#0d47a1; --ok:#2e7d32; --warn:#f57c00; --err:#c62828;
  --bg:#f0f4f8; --card:#fff; --ink:#1a1a2e; --ink2:#4a5568; --ink3:#718096;
  --ink4:#a0aec0; --border:#e2e8f0; --scan:#00c851; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;background:linear-gradient(135deg,#0d47a1 0%,#1a73e8 50%,#00acc1 100%);}
.login-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo img{object-fit:contain;border-radius:10px;display:inline-block;}
.login-divider{width:100%;height:1px;background:var(--border);margin:16px 0;}
.field-group{margin-bottom:14px;}
.field-label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;color:var(--ink);background:#fafafa;transition:border .2s;outline:none;}
.field-input:focus{border-color:var(--brand);background:#fff;}
select.field-input{cursor:pointer;}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s;}
.btn-login:active{opacity:.85;}
.login-footer{text-align:center;margin-top:16px;font-size:11px;color:var(--ink4);}

/* APP */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
.header{background:linear-gradient(135deg,var(--brand2),var(--brand));color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.header-logo img{height:30px;object-fit:contain;border-radius:4px;}
.header-title{flex:1;min-width:0;}
.header-title h2{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-store{font-size:10px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-user{display:flex;align-items:center;gap:6px;}
.header-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.rak-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}

.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:52px;z-index:99;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--ink3);border:none;background:none;cursor:pointer;transition:color .2s;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);}

.tab-content{display:none;padding:14px;}
.tab-content.active{display:block;}

/* SCAN TAB */
.scan-area{background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.scan-header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.scan-header h3{font-size:14px;font-weight:700;}
.btn-scan{padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-scan.start{background:#00c851;color:#fff;}
.btn-scan.stop{background:#ff3d00;color:#fff;}
#reader{width:100%;}

.product-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--brand);display:none;}
.product-card.visible{display:block;}
.prod-barcode{font-size:11px;color:var(--ink4);margin-bottom:4px;}
.prod-name{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:12px;line-height:1.3;}
.prod-info-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.prod-info-chip{background:var(--bg);border-radius:6px;padding:6px 10px;font-size:12px;}
.prod-info-chip span{display:block;font-size:10px;color:var(--ink3);margin-bottom:2px;font-weight:600;text-transform:uppercase;}
.prod-info-chip b{font-size:15px;color:var(--ink);}
.rak-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.rak-tag{background:#e3f2fd;color:#1565c0;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;}
.btn-ganti-rak{font-size:11px;color:var(--brand);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;}

.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.qty-label{font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;}
.qty-stepper{display:flex;align-items:center;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.qty-btn{width:38px;height:38px;border:none;background:var(--bg);font-size:18px;font-weight:700;cursor:pointer;color:var(--ink2);}
.qty-val{width:60px;text-align:center;font-size:18px;font-weight:700;border:none;outline:none;color:var(--ink);}
.selisih-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.selisih-label{font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;}
.selisih-val{font-size:16px;font-weight:700;padding:4px 12px;border-radius:6px;}
.selisih-val.ok{background:#e8f5e9;color:var(--ok);}
.selisih-val.minus{background:#fce4ec;color:var(--err);}
.selisih-val.plus{background:#fff3e0;color:var(--warn);}

.btn-simpan{width:100%;padding:13px;background:var(--ok);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-simpan:active{opacity:.85;}

/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:14px;}
.stat-chip{flex:1;background:var(--card);border-radius:10px;padding:10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.stat-chip .s-val{font-size:22px;font-weight:800;}
.stat-chip .s-lbl{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;}
.stat-chip.total .s-val{color:var(--brand);}
.stat-chip.kurang .s-val{color:var(--err);}
.stat-chip.lebih .s-val{color:var(--warn);}

/* HASIL TAB */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.search-box{flex:1;min-width:140px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;}
.search-box:focus{border-color:var(--brand);}
.btn-sm{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.btn-export{background:var(--ok);color:#fff;}
.btn-refresh{background:var(--brand);color:#fff;}
.btn-danger{background:var(--err);color:#fff;}
.btn-edit{background:var(--warn);color:#fff;}

.result-list{display:flex;flex-direction:column;gap:8px;}
.result-item{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.06);border-left:3px solid var(--border);}
.result-item.minus{border-left-color:var(--err);}
.result-item.plus{border-left-color:var(--warn);}
.result-item.ok{border-left-color:var(--ok);}
.ri-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.ri-name{font-size:13px;font-weight:700;flex:1;margin-right:8px;}
.ri-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;}
.ri-badge.minus{background:#fce4ec;color:var(--err);}
.ri-badge.plus{background:#fff3e0;color:var(--warn);}
.ri-badge.ok{background:#e8f5e9;color:var(--ok);}
.ri-meta{font-size:11px;color:var(--ink3);display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.ri-meta span{background:var(--bg);padding:2px 6px;border-radius:4px;}
.ri-actions{display:flex;gap:6px;}
.ri-edit-row{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.ri-edit-row.visible{display:flex;gap:8px;align-items:center;}
.ri-edit-input{width:70px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;text-align:center;outline:none;}
.ri-edit-input:focus{border-color:var(--brand);}

/* MASTER TAB */
.master-list{display:flex;flex-direction:column;gap:8px;}
.master-item{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.mi-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.mi-meta{font-size:11px;color:var(--ink3);display:flex;gap:8px;flex-wrap:wrap;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
.toast.ok{background:var(--ok);}
.toast.error{background:var(--err);}
.toast.warn{background:var(--warn);}

/* LOADING */
.loading{text-align:center;padding:30px;color:var(--ink3);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CONFIRM DIALOG */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
.overlay.show{display:flex;}
.dialog{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:360px;}
.dialog h3{font-size:16px;font-weight:700;margin-bottom:10px;}
.dialog p{font-size:14px;color:var(--ink2);margin-bottom:20px;line-height:1.5;}
.dialog-btns{display:flex;gap:10px;}
.dialog-btns button{flex:1;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-cancel{background:var(--bg);color:var(--ink2);}
.btn-ok{background:var(--brand);color:#fff;}

.empty{text-align:center;padding:30px;color:var(--ink4);font-size:14px;}
</style>
</head>

    </div>

      </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
// KONFIGURASI
var CONFIG = {
  GAS_URL       : 'https://script.google.com/macros/s/AKfycbxh7sSawmtXErH32N1EYfy92kym24xL7DbvVv-FSVRndC9pTWawSaL28YtyWXaKDovP/exec',
  ALLOW_DUPLICATE: true,
  DEBUG         : false
};

var state = {
  user        : null,
  activeRak   : '',
  activeStore : '',
  masterData  : [],
  masterMap   : {},
  results     : [],
  scanMap     : {},
  scannedSet  : new Set(),
  currentProduct : null,
  scanner     : null,
  scannerActive  : false,
  masterLoaded   : false,
  masterCacheTime: 0,
  editingRow  : null
};

// ---- INIT ----
window.addEventListener('DOMContentLoaded', function() {
  var saved  = sessionStorage.getItem('sso_user');
  var savedR = sessionStorage.getItem('sso_rak');
  var savedS = sessionStorage.getItem('sso_store');
  if (saved) {
    state.user        = JSON.parse(saved);
    state.activeRak   = savedR || '';
    state.activeStore = savedS || '';
    enterApp();
  }
});

// ---- LOGIN ----
function doLogin() {
  var store = document.getElementById('inp-store').value;
  var u     = document.getElementById('inp-user').value.trim();
  var p     = document.getElementById('inp-pass').value;
  var r     = document.getElementById('inp-rak').value.trim();
  if (!store)  { toast('Pilih store / gudang terlebih dahulu', 'error'); return; }
  if (!u || !p) { toast('Username dan password wajib diisi', 'error'); return; }
  if (!r)       { toast('Nomor rak wajib diisi', 'error'); return; }
  toast('Memverifikasi...', '');
  gasGet({ action:'login', user:u, pass:p }).then(function(res) {
    if (res.status === 'success') {
      state.user        = res.user;
      state.activeRak   = r;
      state.activeStore = store;
      sessionStorage.setItem('sso_user',  JSON.stringify(res.user));
      sessionStorage.setItem('sso_rak',   r);
      sessionStorage.setItem('sso_store', store);
      enterApp();
    } else {
      toast(res.message || 'Login gagal', 'error');
    }
  }).catch(function() { toast('Gagal terhubung ke server', 'error'); });
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'flex';
  document.getElementById('user-label').textContent  = state.user.username;
  document.getElementById('user-avatar').textContent = state.user.username[0].toUpperCase();
  document.getElementById('store-label').textContent = state.activeStore || '';
  updateRakBadge();
  loadMaster(false);
  loadHasil();
}

function doLogout() {
  if (state.scanner && state.scannerActive) { state.scanner.stop().catch(function(){}); }
  sessionStorage.removeItem('sso_user');
  sessionStorage.removeItem('sso_rak');
  sessionStorage.removeItem('sso_store');
  state.user = null; state.activeRak = ''; state.activeStore = '';
  state.results = []; state.scanMap = {}; state.scannedSet = new Set();
  document.getElementById('app-screen').style.display   = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-store').value = '';
  document.getElementById('inp-user').value  = '';
  document.getElementById('inp-pass').value  = '';
  document.getElementById('inp-rak').value   = '';
  document.getElementById('reader').innerHTML = '';
  state.scanner = null; state.scannerActive = false;
}

// ---- RAK ----
function updateRakBadge() {
  var r = state.activeRak || '-';
  document.getElementById('rak-badge').textContent      = 'RAK ' + r;
  document.getElementById('prod-rak-aktif').textContent = 'RAK ' + r;
}

function gantiRak() {
  var r = prompt('Masukkan nomor rak baru:', state.activeRak);
  if (r !== null && r.trim() !== '') {
    state.activeRak = r.trim();
    sessionStorage.setItem('sso_rak', state.activeRak);
    updateRakBadge();
    toast('Rak diubah ke ' + state.activeRak, 'ok');
  }
}

// ---- TABS ----
function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

// ---- SCANNER ----
function toggleScanner() {
  if (state.scannerActive) { stopScanner(); } else { startScanner(); }
}

function startScanner() {
  if (!state.scanner) {
    state.scanner = new Html5Qrcode('reader');
  }
  var cfg = { fps:15, qrbox:{ width:260, height:140 }, aspectRatio:1.5 };
  state.scanner.start(
    { facingMode:'environment' }, cfg,
    function(code) { handleBarcode(code.trim()); },
    function() {}
  ).then(function() {
    state.scannerActive = true;
    document.getElementById('btn-scan').textContent = 'Stop';
    document.getElementById('btn-scan').className   = 'btn-scan stop';
  }).catch(function(e) { toast('Gagal akses kamera: ' + e, 'error'); });
}

function stopScanner() {
  if (state.scanner && state.scannerActive) {
    state.scanner.stop().then(function() {
      state.scannerActive = false;
      document.getElementById('btn-scan').textContent = 'Mulai Scan';
      document.getElementById('btn-scan').className   = 'btn-scan start';
    }).catch(function() {});
  }
}

// ---- BARCODE HANDLER ----
function handleBarcode(barcode) {
  if (!barcode) return;
  var prod = state.masterMap[barcode];
  if (!prod) { toast('Barcode tidak ada di master: ' + barcode, 'warn'); return; }
  var rak = state.activeRak;
  var key = barcode + '|' + rak;
  if (state.scanMap[key]) {
    var entry = state.scanMap[key];
    entry.fisik += 1;
    autoUpdateResult(entry, key);
    showProductCard(prod, entry.fisik);
    toast('Auto +1 | Fisik: ' + entry.fisik, 'ok');
  } else {
    var crossKey = null;
    for (var k in state.scanMap) {
      if (k.split('|')[0] === barcode && k !== key) { crossKey = k; break; }
    }
    if (crossKey) {
      var crossRak  = crossKey.split('|')[1];
      var crossFisik = state.scanMap[crossKey].fisik;
      var msg = 'Barcode ini sudah discan di Rak ' + crossRak + ' (Fisik: ' + crossFisik + '). Lanjutkan scan di Rak ' + rak + '?';
      dlgShow('Multi Rak', msg, function() {
        state.currentProduct = prod;
        showProductCard(prod, 1);
      });
    } else {
      state.currentProduct = prod;
      showProductCard(prod, 1);
    }
  }
}

function showProductCard(prod, qty) {
  document.getElementById('prod-barcode').textContent = prod.barcode;
  document.getElementById('prod-name').textContent    = prod.nama;
  document.getElementById('prod-soh').textContent     = prod.soh;
  document.getElementById('prod-rak').textContent     = prod.rak || '-';
  document.getElementById('prod-rak-aktif').textContent = 'RAK ' + (state.activeRak || '-');
  document.getElementById('qty-input').value = qty;
  updateSelisih();
  var card = document.getElementById('product-card');
  card.classList.add('visible');
}

function adjustQty(d) {
  var inp = document.getElementById('qty-input');
  var v   = parseInt(inp.value) || 0;
  v += d;
  if (v < 0) v = 0;
  inp.value = v;
  updateSelisih();
}

function updateSelisih() {
  var prod = state.currentProduct;
  if (!prod) return;
  var fisik   = parseInt(document.getElementById('qty-input').value) || 0;
  var selisih = fisik - prod.soh;
  var el  = document.getElementById('selisih-val');
  el.textContent = (selisih >= 0 ? '+' : '') + selisih;
  el.className   = 'selisih-val ' + (selisih === 0 ? 'ok' : selisih < 0 ? 'minus' : 'plus');
}

function doSimpan() {
  if (!state.currentProduct) return;
  saveResult(state.currentProduct.barcode, false, null);
}

function saveResult(barcode, isUpdate, rowIdx) {
  var prod  = state.masterMap[barcode] || state.currentProduct;
  if (!prod) return;
  var fisik  = parseInt(document.getElementById('qty-input').value) || 0;
  var rakVal = state.activeRak;
  var key    = barcode + '|' + rakVal;
  var payload = {
    barcode : prod.barcode,
    nama    : prod.nama,
    soh     : prod.soh,
    fisik   : fisik,
    rak     : rakVal,
    user    : state.user ? state.user.username : 'Unknown',
    store   : state.activeStore || ''
  };
  document.getElementById('btn-simpan').disabled = true;
  toast('Menyimpan...', '');
  gasPost({ action:'saveResult', data:payload }).then(function(res) {
    if (res.status === 'success') {
      state.scanMap[key] = { rowIndex:res.rowIndex, fisik:fisik, soh:prod.soh, nama:prod.nama, rak:rakVal };
      state.scannedSet.add(barcode);
      state.results.push({
        rowIndex:res.rowIndex, tanggal:res.tanggal, barcode:prod.barcode,
        nama:prod.nama, soh:prod.soh, fisik:fisik,
        selisih:fisik - prod.soh, user:payload.user, rak:rakVal, store:payload.store
      });
      updateStats();
      toast('Tersimpan!', 'ok');
    } else {
      toast('Gagal simpan: ' + (res.message || ''), 'error');
    }
  }).catch(function() { toast('Error koneksi', 'error'); })
  .finally(function() { document.getElementById('btn-simpan').disabled = false; });
}

function autoUpdateResult(entry, key) {
  if (!entry.rowIndex) return;
  gasPost({ action:'updateResult', data:{ rowIndex:entry.rowIndex, fisik:entry.fisik, soh:entry.soh } })
  .then(function(res) {
    if (res.status === 'success') {
      var idx = state.results.findIndex(function(r) { return r.rowIndex === entry.rowIndex; });
      if (idx >= 0) {
        state.results[idx].fisik   = entry.fisik;
        state.results[idx].selisih = entry.fisik - entry.soh;
      }
      updateStats();
    }
  }).catch(function() {});
}

// ---- STATS ----
function updateStats() {
  var total = state.results.length;
  var kurang = state.results.filter(function(r) { return r.selisih < 0; }).length;
  var lebih  = state.results.filter(function(r) { return r.selisih > 0; }).length;
  document.getElementById('stat-total').textContent  = total;
  document.getElementById('stat-kurang').textContent = kurang;
  document.getElementById('stat-lebih').textContent  = lebih;
}

// ---- LOAD MASTER ----
function loadMaster(force) {
  var now = Date.now();
  if (!force && state.masterLoaded && (now - state.masterCacheTime) < 300000) {
    renderMaster(); return;
  }
  document.getElementById('master-list').innerHTML = '<div class="loading"><div class="spinner"></div>Memuat master...</div>';
  gasGet({ action:'getMaster' }).then(function(res) {
    if (res.status === 'success') {
      state.masterData    = res.data || [];
      state.masterMap     = {};
      state.masterLoaded  = true;
      state.masterCacheTime = Date.now();
      state.masterData.forEach(function(p) { state.masterMap[p.barcode] = p; });
      renderMaster();
    } else {
      document.getElementById('master-list').innerHTML = '<div class="empty">Gagal load master</div>';
    }
  }).catch(function() {
    document.getElementById('master-list').innerHTML = '<div class="empty">Error koneksi</div>';
  });
}

function renderMaster() {
  var q    = (document.getElementById('search-master').value || '').toLowerCase();
  var data = state.masterData.filter(function(p) {
    return !q || p.barcode.includes(q) || p.nama.toLowerCase().includes(q);
  });
  if (!data.length) {
    document.getElementById('master-list').innerHTML = '<div class="empty">Tidak ada data</div>'; return;
  }
  var html = data.map(function(p) {
    return '<div class="master-item">' +
      '<div class="mi-name">' + esc(p.nama) + '</div>' +
      '<div class="mi-meta"><span>Barcode: ' + esc(p.barcode) + '</span><span>SOH: ' + p.soh + '</span><span>Rak: ' + esc(p.rak||'-') + '</span></div>' +
    '</div>';
  }).join('');
  document.getElementById('master-list').innerHTML = html;
}

// ---- LOAD HASIL ----
function loadHasil() {
  document.getElementById('hasil-list').innerHTML = '<div class="loading"><div class="spinner"></div>Memuat hasil...</div>';
  gasGet({ action:'getHasil' }).then(function(res) {
    if (res.status === 'success') {
      state.results = res.data || [];
      state.scanMap = {};
      state.results.forEach(function(r) {
        var key = r.barcode + '|' + r.rak;
        state.scanMap[key] = { rowIndex:r.rowIndex, fisik:r.fisik, soh:r.soh, nama:r.nama, rak:r.rak };
        state.scannedSet.add(r.barcode);
      });
      updateStats();
      renderHasil();
    }
  }).catch(function() {
    document.getElementById('hasil-list').innerHTML = '<div class="empty">Error koneksi</div>';
  });
}

function renderHasil() {
  var q    = (document.getElementById('search-hasil').value || '').toLowerCase();
  var data = state.results.filter(function(r) {
    return !q || r.barcode.includes(q) || r.nama.toLowerCase().includes(q) || (r.rak||'').toLowerCase().includes(q);
  });
  if (!data.length) {
    document.getElementById('hasil-list').innerHTML = '<div class="empty">Belum ada data</div>'; return;
  }
  var html = data.slice().reverse().map(function(r) {
    var cls  = r.selisih === 0 ? 'ok' : r.selisih < 0 ? 'minus' : 'plus';
    var sign = r.selisih >= 0 ? '+' : '';
    return '<div class="result-item ' + cls + '">' +
      '<div class="ri-top">' +
        '<div class="ri-name">' + esc(r.nama) + '</div>' +
        '<div class="ri-badge ' + cls + '">' + sign + r.selisih + '</div>' +
      '</div>' +
      '<div class="ri-meta">' +
        '<span>' + esc(r.barcode) + '</span>' +
        '<span>SOH: ' + r.soh + '</span>' +
        '<span>Fisik: ' + r.fisik + '</span>' +
        '<span>Rak: ' + esc(r.rak||'-') + '</span>' +
        (r.store ? '<span>' + esc(r.store) + '</span>' : '') +
        '<span>' + esc(r.user||'') + '</span>' +
      '</div>' +
      '<div class="ri-actions">' +
        '<button class="btn-sm btn-edit" onclick="toggleEdit(this)">Edit</button>' +
        '<button class="btn-sm btn-danger" data-row="' + r.rowIndex + '" onclick="deleteResult(this)">Hapus</button>' +
      '</div>' +
      '<div class="ri-edit-row" id="edit-' + r.rowIndex + '">' +
        '<input class="ri-edit-input" id="ei-' + r.rowIndex + '" type="number" value="' + r.fisik + '" min="0">' +
        '<button class="btn-sm btn-edit" data-row="' + r.rowIndex + '" data-soh="' + r.soh + '" onclick="submitEdit(this)">Simpan</button>' +
        '<button class="btn-sm" style="background:var(--bg);color:var(--ink2);" onclick="toggleEdit(this)">Batal</button>' +
      '</div>' +
    '</div>';
  }).join('');
  document.getElementById('hasil-list').innerHTML = html;
}

function toggleEdit(btn) {
  var editRow = btn.closest('.result-item').querySelector('.ri-edit-row');
  editRow.classList.toggle('visible');
}

function submitEdit(btn) {
  var rowIndex = parseInt(btn.dataset.row);
  var soh      = parseFloat(btn.dataset.soh);
  var inp      = document.getElementById('ei-' + rowIndex);
  var fisik    = parseInt(inp.value) || 0;
  gasPost({ action:'updateResult', data:{ rowIndex:rowIndex, fisik:fisik, soh:soh } }).then(function(res) {
    if (res.status === 'success') {
      var r = state.results.find(function(x) { return x.rowIndex === rowIndex; });
      if (r) { r.fisik = fisik; r.selisih = fisik - soh; }
      for (var k in state.scanMap) {
        if (state.scanMap[k].rowIndex === rowIndex) {
          state.scanMap[k].fisik = fisik; break;
        }
      }
      updateStats(); renderHasil();
      toast('Berhasil diupdate', 'ok');
    }
  }).catch(function() { toast('Error update', 'error'); });
}

function deleteResult(btn) {
  var rowIndex = parseInt(btn.dataset.row);
  dlgShow('Hapus Data', 'Yakin hapus data ini?', function() {
    gasPost({ action:'deleteResult', data:{ rowIndex:rowIndex } }).then(function(res) {
      if (res.status === 'success') {
        state.results = state.results.filter(function(r) { return r.rowIndex !== rowIndex; });
        for (var k in state.scanMap) {
          if (state.scanMap[k].rowIndex === rowIndex) { delete state.scanMap[k]; break; }
        }
        updateStats(); renderHasil();
        toast('Data dihapus', 'ok');
      }
    }).catch(function() { toast('Error hapus', 'error'); });
  });
}

// ---- EXPORT CSV ----
function exportCSV() {
  if (!state.results.length) { toast('Tidak ada data', 'warn'); return; }
  var rows = [['Tanggal','Barcode','Nama Produk','SOH','Fisik','Selisih','User','Rak','Store']];
  state.results.forEach(function(r) {
    rows.push([r.tanggal,r.barcode,r.nama,r.soh,r.fisik,r.selisih,r.user,r.rak,r.store||'']);
  });
  var csv = rows.map(function(r) { return r.map(function(c) { return '"' + String(c||'').replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'stockopname_' + (state.activeStore||'all').replace(/\s+/g,'_') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// ---- API ----
function gasGet(params) {
  var url = new URL(CONFIG.GAS_URL);
  Object.keys(params).forEach(function(k) { url.searchParams.append(k, params[k]); });
  return fetch(url.toString()).then(function(r) { return r.json(); });
}

function gasPost(body) {
  return fetch(CONFIG.GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

// ---- DIALOG ----
function dlgShow(title, msg, onOk) {
  document.getElementById('dlg-title').textContent = title;
  document.getElementById('dlg-msg').textContent   = msg;
  document.getElementById('dlg-ok').onclick = function() { dlgClose(); onOk(); };
  document.getElementById('overlay').classList.add('show');
}

function dlgClose() {
  document.getElementById('overlay').classList.remove('show');
}

// ---- TOAST ----
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = 'toast'; }, 2800);
}

// ---- UTILS ----
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
